<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP-Scope Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 12px; border: 1px solid #334155; width: 360px; }
        .login-box h1 { font-size: 24px; margin-bottom: 8px; }
        .login-box h1 span { color: #3b82f6; }
        .login-box p { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
        .login-box input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 16px; }
        .login-box input:focus { outline: none; border-color: #3b82f6; }
        .login-box button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .login-box button:hover { background: #2563eb; }
        .error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>MCP-<span>Scope</span></h1>
        <p>Enter dashboard password to continue</p>
        <input type="password" id="password" placeholder="Password" autofocus>
        <button onclick="login()">Sign In</button>
        <div class="error" id="error">Invalid password</div>
    </div>
    <script>
        async function login() {
            const pw = document.getElementById('password').value;
            const err = document.getElementById('error');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: pw}),
                });
                if (!res.ok) { err.style.display = 'block'; return; }
                window.location.href = '/';
            } catch { err.style.display = 'block'; }
        }
        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
