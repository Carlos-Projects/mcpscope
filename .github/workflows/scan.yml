name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest -v

      - name: Generate demo data
        run: |
          mcpscope seed

      - name: Generate reports
        run: |
          mcpscope report --format json --output scan-report.json
          mcpscope report --format csv --output scan-report.csv

      - name: Check report
        run: |
          python3 -c "
import json
d = json.load(open('scan-report.json'))
print(f'Scans: {d[\"summary\"][\"total_scans\"]}')
print(f'Findings: {d[\"summary\"][\"total_findings\"]}')
print(f'Critical: {d[\"summary\"][\"critical\"]}')
assert d['summary']['total_scans'] > 0, 'No scans generated'
"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: mcpscope-reports
          path: |
            scan-report.json
            scan-report.csv
